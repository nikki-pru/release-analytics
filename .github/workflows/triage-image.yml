name: Build triage image

# Publishes ghcr.io/liferay-release/triage.
# - tag push `triage-v*`  -> versioned image + :latest
# - manual dispatch        -> image tagged with the supplied tag

on:
  push:
    tags:
      - 'triage-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. dev, 1.2.3)'
        required: true
        default: 'dev'

env:
  IMAGE: ghcr.io/liferay-release/triage

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=triage-v(.*),group=1,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/triage
          file: apps/triage/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
