# =============================================================================
# releases.yml — Release Registry
# =============================================================================
#
# HOW TO ADD A NEW RELEASE:
#   1. Copy one of the blocks below (everything from "- label:" to the last field)
#   2. Paste it at the bottom of the list
#   3. Fill in the fields (see field guide below)
#   4. Save the file and notify your engineer to run sync_releases.R
#      (or run it yourself if you have RStudio access)
#
# FIELD GUIDE:
#
#   label           The release identifier. Use the internal tag for milestones
#                   (U147, U148) or the quarter label for GA releases (2024.Q1).
#                   Must be unique. Never change a label after it's been synced.
#
#   quarter_label   The quarter this release belongs to (e.g. 2024.Q1, 2026.Q2).
#                   For quarterly GA releases this is the same as label.
#                   For internal milestones (U1xx) this is the parent quarter.
#
#   git_tag         The git release tag for this release.
#                   Example: 7.4.13-u110  or  2024.q1.1
#                   Ask your engineer if you're not sure.
#                   For in-development releases, leave blank until the tag is cut.
#
#   release_date    The date the release shipped. Leave blank until it ships.
#                   Format: YYYY-MM-DD  (example: 2026-03-15)
#
#   is_major_release  true  = external quarterly GA release (Q1/Q2/Q3/Q4)
#                     false = internal milestone only (U1xx)
#
#   is_lts            true  = Q1 Long Term Support release — customers stay on these
#                             longer so bug counts accumulate over a longer window
#                     false = standard quarterly or internal release
#
#   status          One of three values — update as the release progresses:
#                     IN_DEVELOPMENT  → branch not yet cut, churn is partial
#                     BRANCH_CUT      → branch cut, git_tag is set
#                     RELEASED        → shipped, release_date is set
#
#   notes           Optional. Anything useful for context (theme, scope, etc.)
#
# =============================================================================

